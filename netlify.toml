[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy API calls to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://inces-api.onrender.com/api/:splat"
  status = 200

# SPA fallback: todas las rutas al index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
